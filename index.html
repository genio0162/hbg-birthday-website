    <style>
        /* CSS Reset & Global Layout */
        body,
        html {
            margin: 0;
            padding: 0;
            background-color: #000000;
            /* Hitam pekat */
            color: white;
            overflow-x: hidden;
            font-family: 'Fredoka', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: pan-y;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #fb7185, #c026d3);
            border-radius: 10px;
        }

        /* Container WebGL (Three.js) */
        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Smiley Button Animation - Button tetap bentuknya */
        .smiley-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            min-width: 200px;
            min-height: 56px;
        }

        .smiley-btn .btn-text {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .smiley-btn.morphing .btn-text {
            opacity: 0;
            transform: scale(0.5);
        }

        .smiley-btn.morphing {
            box-shadow: 0 0 50px rgba(251, 113, 133, 0.8) !important;
        }

        .smiley-face {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease 0.2s;
        }

        .smiley-btn.morphing .smiley-face {
            opacity: 1;
        }

        .smiley-eye {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 35%;
            animation: eyeBlink 1.5s ease-in-out infinite;
        }

        .smiley-eye.left {
            left: 32%;
        }

        .smiley-eye.right {
            right: 32%;
        }

        .smiley-mouth {
            position: absolute;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 0px;
            height: 0px;
            border-bottom: 3px solid #fff;
            border-radius: 0 0 50% 50%;
            animation: mouthSmile 1.2s ease-out 0.4s forwards;
        }

        @keyframes eyeBlink {

            0%,
            40%,
            60%,
            100% {
                transform: scaleY(1);
            }

            50% {
                transform: scaleY(0.1);
            }
        }

        @keyframes mouthSmile {
            0% {
                width: 0px;
                height: 0px;
                border-radius: 0;
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            50% {
                width: 20px;
                height: 6px;
                border-radius: 0 0 40% 40%;
            }

            80% {
                width: 30px;
                height: 10px;
                border-radius: 0 0 50% 50%;
            }

            100% {
                width: 35px;
                height: 12px;
                border-radius: 0 0 50% 50%;
            }
        }

        @keyframes smileyWiggle {

            0%,
            100% {
                transform: scale(1) rotate(0deg);
            }

            20% {
                transform: scale(1.05) rotate(-2deg);
            }

            40% {
                transform: scale(1.08) rotate(2deg);
            }

            60% {
                transform: scale(1.05) rotate(-1deg);
            }

            80% {
                transform: scale(1.03) rotate(1deg);
            }
        }

        .smiley-wiggle {
            animation: smileyWiggle 0.8s ease-in-out 0.8s;
        }

        /* Elevasi Z-Index untuk React Root agar di atas WebGL */
        #root {
            position: relative;
            z-index: 10;
        }

        /* Utilitas Drag & Drop Mobile */
        .draggable {
            touch-action: none;
            /* Mencegah layar ter-scroll saat elemen sedang digeser */
            user-select: none;
            -webkit-user-select: none;
            cursor: grab;
            will-change: transform;
        }

        .draggable:active {
            cursor: grabbing;
        }

        /* Efek Kaca Premium (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);

            transition: box-shadow 0.3s;

            height: 100%;

            border-radius: 2px;

            left: 50%;
            transform: translateX(-50%);

            }

            20% {

            }

            100% {
                transform: translate(calc(-15px + 30px * var(--dir)), -60px) scale(1.2) rotate(15deg);
                opacity: 0;
            }

        .mini-heart {
            position: absolute;
            bottom: 50%;
            animation: floatHeart 2.5s infinite ease-in;
            pointer-events: none;
            z-index: 0;
        }

        /* Scroll Reveal Quote */
        .scroll-reveal-quote {

            top: 30vh;
            z-index: 50; /* Z-Index tinggi supaya di depan memories */
            opacity: 0;
            transform: translateY(40px) scale(0.95);

        }
        .scroll-reveal-quote.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .scroll-reveal-quote.behind {
            z-index: -1; /* Lenyap tertelan memories */
            opacity: 0.15;
            transition: opacity 1.5s ease, z-index 0s 1.5s;
        }

        /* Envelope Animation */
        .envelope-wrapper {
            perspective: 800px;
            cursor: pointer;
        }
        .envelope-body {
            position: relative;
            width: 120px; height: 90px;
            background: linear-gradient(135deg, #ffe4e6, #fecdd3);
            border: 2px solid #fb7185;
            border-radius: 6px;
            overflow: visible;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: box-shadow 0.3s, transform 0.3s;
        }
        .envelope-body:hover {
            box-shadow: 0 0 30px rgba(251, 113, 133, 0.6);
            transform: scale(1.05);
        }
        .envelope-flap {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(180deg, #fda4af, #ffe4e6);
            border-bottom: 2px solid #fb7185;
            transform-origin: top center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3;
            clip-path: polygon(0 0, 50% 100%, 100% 0);
        }
        .envelope-wrapper.opened .envelope-flap {
            transform: rotateX(-180deg);
        }
        .envelope-letter {
            position: absolute;
            bottom: 5px; left: 10%; right: 10%;
            height: 70%;
            background: #fff;
            border-radius: 3px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transform: translateY(0);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .envelope-wrapper.opened .envelope-letter {
            transform: translateY(-60px);
        }
        .envelope-heart {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            transition: opacity 0.3s;
        }
        .envelope-wrapper.opened .envelope-heart {
            opacity: 0;
        }

        /* Shake hint animation */
        @keyframes shakeHint {
            0%, 100% { transform: translateX(0) rotate(0); }
            10% { transform: translateX(-5px) rotate(-2deg); }
            20% { transform: translateX(5px) rotate(2deg); }
            30% { transform: translateX(-5px) rotate(-1deg); }
            40% { transform: translateX(5px) rotate(1deg); }
            50% { transform: translateX(0) rotate(0); }
        }
        .shake-hint { animation: shakeHint 1.5s ease-in-out 2s; }
    </style>
</head>

        // Data Surat Panjang (Envelopes)
        const lettersData = [

        // ==========================================
        // 2. KUMPULAN CUSTOM HOOKS (Fisika, Sensor, dll)
        // ==========================================

        // Hook untuk Gyroscope / Device Orientation (Kemiringan HP)
        const useDeviceOrientation = () => {
            const [tilt, setTilt] = useState({ x: 0, y: 0 });

            useEffect(() => {
                const handleOrientation = (event) => {
                    // Gamma: Kiri/Kanan (-90 hingga 90) -> Normalisasi ke -1 hingga 1
                    // Beta: Depan/Belakang (-180 hingga 180) -> Normalisasi ke -1 hingga 1
                    let x = event.gamma ? event.gamma / 45 : 0;
                    let y = event.beta ? (event.beta - 45) / 45 : 0;

                    // Batasi nilai ekstrim
                    x = Math.max(-1, Math.min(1, x));
                    y = Math.max(-1, Math.min(1, y));

                    setTilt({ x, y });
                };

                // Desktop fallback menggunakan pergerakan mouse
                const handleMouseMove = (event) => {
                    const x = (event.clientX / window.innerWidth - 0.5) * 2;
                    const y = (event.clientY / window.innerHeight - 0.5) * 2;
                    setTilt({ x, y });
                };

                // Cek jika device mendukung orientasi
                if (window.DeviceOrientationEvent) {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
                window.addEventListener('mousemove', handleMouseMove);

                return () => {
                    window.removeEventListener('deviceorientation', handleOrientation);
                    window.removeEventListener('mousemove', handleMouseMove);
                };
            }, []);

            return tilt;
        };

        // Hook untuk mendeteksi goncangan (Shake)
        const useShake = (onShake) => {
            useEffect(() => {
                let lastTime = new Date().getTime();
                let lastX = null, lastY = null, lastZ = null;
                const threshold = 15; // Sensitivitas goncangan
                
                const handleMotion = (e) => {
                    // Gunakan acceleration biasa agar tidak terpengaruh gravitasi konstan
                    const current = e.acceleration || e.accelerationIncludingGravity;
                    if (!current) return;
                    
                    const currentTime = new Date().getTime();
                    if ((currentTime - lastTime) > 100) {
                        const diffTime = currentTime - lastTime;
                        lastTime = currentTime;
                        
                        if (lastX !== null) {
                            const speed = Math.abs(current.x + current.y + current.z - lastX - lastY - lastZ) / diffTime * 10000;
                            if (speed > threshold) {
                                onShake();
                            }
                        }
                        lastX = current.x; lastY = current.y; lastZ = current.z;
                    }
                };
                
                if (window.DeviceMotionEvent) {
                    window.addEventListener('devicemotion', handleMotion, false);
                }
                return () => window.removeEventListener('devicemotion', handleMotion);
            }, [onShake]);
        };

        // Hook untuk Drag & Drop Elemen di Canvas
        const useDraggable = (initialPosition, bringToFront, isOrganized, organizedPos) => {
            const [position, setPosition] = useState(initialPosition);
            const [isDragging, setIsDragging] = useState(false);
            const dragStartRef = useRef({ x: 0, y: 0 });
            const initialPosRef = useRef(initialPosition);

            // Jika mode terorganisir aktif, pindahkan ke posisi rapih
            useEffect(() => {
                if (isOrganized && organizedPos) {
                    setPosition(organizedPos);
                } else if (!isOrganized) {
                    // Kembali ke pencar jika dimatikan? (Sifat opsional, kita biarkan saja tetap kalau mau)
                    // setPosition(initialPosition); 
                }
            }, [isOrganized, organizedPos]);

            const handlePointerDown = (e) => {
                setIsDragging(true);
                bringToFront(); // Panggil fungsi dari parent untuk menaikkan z-index
                e.target.setPointerCapture(e.pointerId);

                // Simpan koordinat awal sentuhan/klik
                dragStartRef.current = {
                    x: e.clientX,
                    y: e.clientY
                };
                initialPosRef.current = { ...position };
                e.preventDefault(); // Cegah default behaviour
            };

            const handlePointerMove = (e) => {
                if (!isDragging) return;

                // Hitung delta (perubahan posisi)
                const dx = e.clientX - dragStartRef.current.x;
                const dy = e.clientY - dragStartRef.current.y;

                setPosition({
                    x: initialPosRef.current.x + dx,
                    y: initialPosRef.current.y + dy
                });
            };

            const handlePointerUp = (e) => {
                setIsDragging(false);
                e.target.releasePointerCapture(e.pointerId);
            };

            return {
                position,
                isDragging,
                handlers: {
                    onPointerDown: handlePointerDown,
                    onPointerMove: handlePointerMove,
                    onPointerUp: handlePointerUp,
                    onPointerCancel: handlePointerUp
                },
                transitionStyle: { transition: isDragging ? 'none' : 'all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1)' }
            };
        };

        // ==========================================
        // 3. KOMPONEN THREE.JS (Latar Belakang Interaktif)
        // ==========================================
        const InteractiveThreeBackground = () => {
            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                document.getElementById('webgl-container').appendChild(renderer.domElement);

                // --- FUNGSI MEMBUAT TEKSTUR HATI (Tanpa File Eksternal) ---
                const createHeartTexture = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 64; canvas.height = 64;
                    const ctx = canvas.getContext('2d');

                    // Menggambar bentuk hati menggunakan Bezier Curve di Canvas
                    ctx.beginPath();
                    ctx.moveTo(32, 15);
                    ctx.bezierCurveTo(32, 12, 28, 0, 16, 0);
                    ctx.bezierCurveTo(0, 0, 0, 24, 0, 24);
                    ctx.bezierCurveTo(0, 40, 16, 52, 32, 64);
                    ctx.bezierCurveTo(48, 52, 64, 40, 64, 24);
                    ctx.bezierCurveTo(64, 24, 64, 0, 48, 0);
                    ctx.bezierCurveTo(36, 0, 32, 12, 32, 15);
                    ctx.fillStyle = "#fb7185"; // Warna Pink Tailwind
                    ctx.fill();

                    const texture = new THREE.CanvasTexture(canvas);
                    return texture;
                };

                const heartTexture = createHeartTexture();

                // Membangun Partikel Hati
                const particlesCount = 200; // Jumlah hati bertebaran
                const geometry = new THREE.BufferGeometry();
                const posArray = new Float32Array(particlesCount * 3);

                // Menyimpan data asli untuk efek fisika repulsi (menjauh)
                const originalPositions = [];

                for (let i = 0; i < particlesCount * 3; i += 3) {
                    // Posisi acak X, Y, Z
                    const x = (Math.random() - 0.5) * 40;
                    const y = (Math.random() - 0.5) * 40;
                    const z = (Math.random() - 0.5) * 20 - 5;

                    posArray[i] = x;
                    posArray[i + 1] = y;
                    posArray[i + 2] = z;

                    originalPositions.push({ x, y, z });
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

                const material = new THREE.PointsMaterial({
                    size: 0.8,
                    map: heartTexture,
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending, // Efek bercahaya
                    depthWrite: false
                });

                const particlesMesh = new THREE.Points(geometry, material);
                scene.add(particlesMesh);

                camera.position.z = 10;

                // Variabel Interaksi Mouse/Touch
                let mouseX = 0;
                let mouseY = 0;
                let targetX = 0;
                let targetY = 0;

                const onDocumentMouseMove = (event) => {
                    // Normalisasi mouse/touch dari -1 ke 1
                    mouseX = (event.clientX / window.innerWidth) * 2 - 1;
                    mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
                };

                // Deteksi touch di mobile
                const onDocumentTouchMove = (event) => {
                    if (event.touches.length > 0) {
                        mouseX = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                        mouseY = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
                    }
                };

                document.addEventListener('mousemove', onDocumentMouseMove, false);
                document.addEventListener('touchmove', onDocumentTouchMove, false);

                // Animasi Loop
                const clock = new THREE.Clock();
                let animationFrameId;

                const animate = () => {
                    animationFrameId = requestAnimationFrame(animate);
                    const elapsedTime = clock.getElapsedTime();

                    // Efek berputar lambat ke seluruh galaksi hati
                    particlesMesh.rotation.y = elapsedTime * 0.05;
                    particlesMesh.rotation.x = Math.sin(elapsedTime * 0.1) * 0.1;

                    // Mengambil posisi partikel saat ini
                    const positions = particlesMesh.geometry.attributes.position.array;

                    // Konversi posisi mouse ke koordinat dunia 3D (perkiraan sederhana)
                    const vector = new THREE.Vector3(mouseX, mouseY, 0.5);
                    vector.unproject(camera);
                    const dir = vector.sub(camera.position).normalize();
                    const distance = -camera.position.z / dir.z;
                    const mousePos3D = camera.position.clone().add(dir.multiplyScalar(distance));

                    for (let i = 0; i < particlesCount; i++) {
                        const i3 = i * 3;
                        const origX = originalPositions[i].x;
                        const origY = originalPositions[i].y;

                        // Efek melayang alami (Sinus wave)
                        let currentX = origX + Math.sin(elapsedTime + i) * 0.5;
                        let currentY = origY + Math.cos(elapsedTime + i) * 0.5;

                        // Efek Repulsi: Hati menjauh jika didekati mouse/jari
                        const dx = mousePos3D.x - currentX;
                        const dy = mousePos3D.y - currentY;
                        const distToMouse = Math.sqrt(dx * dx + dy * dy);

                        // Radius repulsi = 3 unit. Jika di dalam radius, dorong menjauh
                        if (distToMouse < 3) {
                            const force = (3 - distToMouse) / 3; // Kekuatan dorongan
                            currentX -= (dx / distToMouse) * force * 1.5;
                            currentY -= (dy / distToMouse) * force * 1.5;
                        }

                        // Update posisi
                        positions[i3] = currentX;
                        positions[i3 + 1] = currentY;
                    }
                    particlesMesh.geometry.attributes.position.needsUpdate = true;

                    // Parallax Kamera berdasarkan scroll window
                    targetY = window.scrollY * 0.002;
                    camera.position.y += (-targetY - camera.position.y) * 0.05;

                    renderer.render(scene, camera);
                };
                animate();

                // Handle Resize Layar
                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    document.removeEventListener('mousemove', onDocumentMouseMove);
                    document.removeEventListener('touchmove', onDocumentTouchMove);
                    cancelAnimationFrame(animationFrameId);
                    geometry.dispose();
                    material.dispose();
                    renderer.dispose();
                    const container = document.getElementById('webgl-container');
                    if (container) container.innerHTML = '';
                };
            }, []);

        };

                    <div className="fixed inset-0 flex flex-col items-center justify-center z-[200] px-6 text-center" style={{ background: '#000' }}>
                        <div className="w-24 h-24 mb-8 text-brand animate-pulse-glow">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" /></svg>
                        </div>
                        <h1 className="font-bubble text-3xl md:text-5xl text-white mb-4">Ada paket ayangkkooi kado ultah...</h1>
                        <p className="text-gray-400 mb-12 text-sm md:text-base max-w-md">
                            Website ini menggunakan musik dan sensor kemiringan layar untuk pengalaman terbaik. Pastikan volume HP-mu menyala.
                        </p>
                        <div className="relative inline-block">
                            {/* Partikel Love Imut */}
                            <span className="mini-heart text-xl" style={{ left: '10%', animationDelay: '0.1s', '--dir': 0.5 }}>💖</span>
                            <span className="mini-heart text-sm" style={{ left: '30%', animationDelay: '0.8s', '--dir': -1 }}>✨</span>
                            <span className="mini-heart text-lg" style={{ left: '50%', animationDelay: '0.4s', '--dir': 1 }}>💖</span>
                            <span className="mini-heart text-sm" style={{ left: '70%', animationDelay: '1.2s', '--dir': -0.5 }}>🌸</span>
                            <span className="mini-heart text-xl" style={{ left: '90%', animationDelay: '1.6s', '--dir': 0.8 }}>💖</span>

                            <button
                                onClick={handleOpenClick}
                                className={`smiley-btn relative z-10 bg-brand text-white font-bold text-lg py-4 px-10 rounded-full shadow-[0_0_30px_rgba(251,113,133,0.6)] hover:bg-brand-dark transition-all transform hover:scale-105 ${isMorphing ? 'morphing smiley-wiggle' : ''}`}
                            >
                                <span className="btn-text">Buka Sekarang</span>
                                <div className="smiley-face">
                                    <div className="smiley-eye left"></div>
                                    <div className="smiley-eye right"></div>
                                    <div className="smiley-mouth"></div>
                                </div>
                            </button>
                        </div>
                        {isMorphing && (
                            <p className="mt-8 text-brand-light font-handwriting text-2xl animate-pulse">Hehe... siap-siap ya! 😊</p>
                        )}
                    </div>
                );
            }

            // --- LAYAR UTAMA WEB ---
            return (
                <div className="relative w-full overflow-hidden">
                    <InteractiveThreeBackground />
                    <ClickSparkles />
                    <AudioBGM isStarted={isStarted} />

                    {/* Modals */}
                    <MediaModal item={selectedMedia} onClose={() => setSelectedMedia(null)} />
                    <LetterModal letter={selectedLetter} onClose={() => setSelectedLetter(null)} />

                    {/* === BAGIAN 1: HERO SECTION === */}
                    <section className="min-h-[100dvh] flex flex-col items-center justify-center relative pointer-events-none">
                        <div
                            className="glass-panel p-10 md:p-16 rounded-[40px] text-center border-t border-l border-white/20 relative z-10 transition-transform duration-200"
                            style={{
                                // Efek Parallax pada Card Utama Hero
                                transform: `translate(${tilt.x * -30}px, ${tilt.y * -30}px)`
                            }}
                        >
                            <h2 className="text-2xl md:text-3xl text-brand-light font-medium mb-2 drop-shadow-md">Selamat Ulang Tahun</h2>
                            <h1 className="text-[120px] md:text-[180px] font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-brand-light via-brand to-purple-600 leading-none drop-shadow-2xl font-bubble">
                                26
                            </h1>
                            <p className="text-xl md:text-2xl text-gray-200 mt-4 max-w-lg mx-auto font-light">
                                "Menua bersamamu adalah doa yang selalu mas semogakan."
                            </p>
                        </div>

                        <div className="absolute bottom-12 flex flex-col items-center animate-bounce text-gray-400">
                            <span className="text-sm uppercase tracking-widest mb-2 font-bold">Scroll ke bawah & sentuh memori kita</span>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 9 6 6 6-6"></path></svg>
                        </div>
                    </section>

                    {/* === BAGIAN 2: KANVAS MEMORI BERTEBARAN === */}
                    {/* Responsive canvas height */}
                    <section 
                        className="relative w-full overflow-visible transition-all duration-1000 ease-in-out" 
                        style={{ 
                            minHeight: isOrganized 
                                ? `${100 + (notesData.length * (window.innerWidth <= 768 ? 160 : 200)) + (galleryData.length * (window.innerWidth <= 768 ? 260 : 350)) + 300}px` 
                                : (window.innerWidth <= 768 ? '1800px' : '2500px') 
                        }}
                    >

                        {/* Scroll Reveal Quote - muncul saat di-scroll, lalu perlahan ke belakang */}
                        <ScrollRevealQuote />

                        {/* Render Sticky Notes */}
                        {initialNotesLayout.map((note, index) => (
                            <DraggableNote
                                key={note.id}
                                text={note.text}
                                defaultPos={note.initialPos}
                                defaultRot={note.initialRot}
                                zIndex={note.zIndex}
                                bringToFront={() => {
                                    setHighestZIndex(prev => prev + 1);
                                    note.zIndex = highestZIndex + 1;
                                }}
                                tilt={tilt}
                                isOrganized={isOrganized}
                                organizedPos={{
                                    x: window.innerWidth / 2 - (window.innerWidth <= 768 ? 140 : 200)/2,
                                    y: 100 + (index * (window.innerWidth <= 768 ? 160 : 200))
                                }}
                            />
                        ))}

                        {/* Render Polaroids */}
                        {initialGalleryLayout.map((item, index) => (
                            <DraggablePolaroid
                                key={item.id}
                                item={item}
                                defaultPos={item.initialPos}
                                defaultRot={item.initialRot}
                                zIndex={item.zIndex}
                                bringToFront={() => {
                                    setHighestZIndex(prev => prev + 1);
                                    item.zIndex = highestZIndex + 1;
                                }}
                                onClickItem={setSelectedMedia}
                                tilt={tilt}
                                isOrganized={isOrganized}
                                organizedPos={{
                                    x: window.innerWidth / 2 - (window.innerWidth <= 768 ? 180 : 260)/2,
                                    y: 100 + (initialNotesLayout.length * (window.innerWidth <= 768 ? 160 : 200)) + (index * (window.innerWidth <= 768 ? 260 : 350))
                                }}
                            />
                        ))}
                    </section>

                    {/* === BAGIAN 3: SURAT MELAYANG (ENVELOPES) === */}
                    <section className="min-h-screen py-20 relative flex flex-col items-center justify-center bg-gradient-to-b from-transparent to-black/80">
                        <div className="text-center mb-16 relative z-10 px-4">
                            <h2 className="text-4xl md:text-5xl font-bold text-brand-light mb-4">Kotak Pos Cinta 💌</h2>
                            <p className="text-xl text-gray-300">Pilih salah satu surat yang mengambang ini</p>
                        </div>

                        <div className="flex flex-wrap justify-center gap-10 md:gap-20 px-4 relative z-10">
                            {lettersData.map((letter, index) => (
                                <FloatingEnvelope
                                    key={letter.id}
                                    letter={letter}
                                    delay={index * 0.5} // Delay agar melayangnya tidak serentak
                                    onClick={setSelectedLetter}
                                />
                            ))}
                        </div>
                    </section>

                    {/* === FOOTER === */}
                    <footer className="py-12 text-center border-t border-white/10 relative z-10 glass-panel bg-black/50">
                        <div className="flex justify-center mb-4">
                            <div className="w-2 h-2 rounded-full bg-brand mx-1 animate-ping"></div>
                            <div className="w-2 h-2 rounded-full bg-brand mx-1 animate-ping" style={{ animationDelay: '0.2s' }}></div>
                            <div className="w-2 h-2 rounded-full bg-brand mx-1 animate-ping" style={{ animationDelay: '0.4s' }}></div>
                        </div>
                        <p className="text-gray-300 font-handwriting text-2xl md:text-3xl">Selamat Ulang Tahun ke-26, Sayang.</p>
                        <p className="text-gray-500 mt-2 text-sm font-sans">Dibuat khusus untukmu oleh Mas. Sayang kamu selamanya.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
